name: build

on:
  pull_request:
    branches: [main, master, alpha, beta]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # for checkout

jobs:
  linux_nix:
    uses: SpiralP/github-reusable-workflows/.github/workflows/build.yml@560edc3bd2649d5b1cbf9802975628341c4292ac # main

  windows:
    name: Build & Test Windows ${{ matrix.config.arch }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: x86_64, target: x86_64-pc-windows-msvc }
          # - { arch: i686, target: i686-pc-windows-msvc }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/install-build-test
        with:
          target: ${{ matrix.config.target }}

  linux:
    name: Build & Test Linux ${{ matrix.config.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: x86_64, target: x86_64-unknown-linux-gnu }
          # - { arch: i686, target: i686-unknown-linux-gnu }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/install-build-test
        with:
          target: ${{ matrix.config.target }}

  mac:
    name: Build & Test macOS ${{ matrix.config.arch }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: aarch64, target: aarch64-apple-darwin }
          # - { arch: x86_64, target: x86_64-apple-darwin }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/install-build-test
        with:
          target: ${{ matrix.config.target }}
