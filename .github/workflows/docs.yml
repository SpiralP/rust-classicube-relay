name: docs

# Dispatched by release.yml (via the reusable release workflow's
# `build-workflow:` input) on the freshly-pushed release tag. Running on the
# tag pins the default checkout to the released commit, so the docs embed the
# just-bumped version. release.yml's deploy-docs job then pulls the
# `github-pages` artifact staged here across into its own run for Pages.
on:
  workflow_dispatch:

permissions:
  contents: read # for checkout

jobs:
  docs:
    uses: SpiralP/github-reusable-workflows/.github/workflows/build.yml@4135d0506b2db8697261533006301466098b0a0b # main
    with:
      flake-attribute: docs
      upload-pages-artifact: true
